<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Upload Test</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 720px;
      margin: 40px auto;
      padding: 0 16px;
      line-height: 1.5;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      background: #fff;
    }

    h1 {
      margin-top: 0;
      font-size: 24px;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .field {
      width: 100%;
      margin-bottom: 12px;
    }

    .field label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: #333;
    }

    .field input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      background: #0b5fff;
      color: #fff;
      cursor: pointer;
    }

    button:disabled {
      background: #8aaeff;
      cursor: not-allowed;
    }

    #status {
      margin: 8px 0;
      font-weight: 600;
    }

    #resultImage {
      display: none;
      max-width: 100%;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ddd;
    }

    #resultJson {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #imageLink {
      display: none;
      margin-top: 8px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Image Upload Test</h1>

    <div class="field">
      <label for="publicBaseUrl">Public URL base (optional)</label>
      <input
        id="publicBaseUrl"
        type="text"
        placeholder="https://your-domain.com/uploads"
      />
    </div>

    <div class="row">
      <input id="imageInput" type="file" accept="image/*" />
      <button id="uploadBtn" type="button">Upload Image</button>
    </div>

    <div id="status">Choose an image and click upload.</div>
    <a id="imageLink" target="_blank" rel="noopener noreferrer"></a>
    <img id="resultImage" alt="Uploaded image preview" />
    <pre id="resultJson"></pre>
  </div>

  <script>
    const imageInput = document.getElementById("imageInput");
    const uploadBtn = document.getElementById("uploadBtn");
    const statusText = document.getElementById("status");
    const publicBaseInput = document.getElementById("publicBaseUrl");
    const imageLink = document.getElementById("imageLink");
    const resultImage = document.getElementById("resultImage");
    const resultJson = document.getElementById("resultJson");

    const savedBaseUrl = localStorage.getItem("publicBaseUrl");
    if (savedBaseUrl) {
      publicBaseInput.value = savedBaseUrl;
    }

    publicBaseInput.addEventListener("input", () => {
      localStorage.setItem("publicBaseUrl", publicBaseInput.value.trim());
    });

    function buildPublicUrl(baseUrl, filename) {
      if (!baseUrl || !filename) {
        return "";
      }

      const cleanBase = baseUrl.replace(/\/$/, "");
      return `${cleanBase}/${filename}`;
    }

    uploadBtn.addEventListener("click", async () => {
      const file = imageInput.files[0];

      if (!file) {
        statusText.textContent = "Please select an image first.";
        return;
      }

      const formData = new FormData();
      formData.append("image", file);

      uploadBtn.disabled = true;
      statusText.textContent = "Uploading...";
      resultImage.style.display = "none";
      imageLink.style.display = "none";
      imageLink.href = "#";
      imageLink.textContent = "";
      resultJson.textContent = "";

      try {
        const response = await fetch("/upload-image", {
          method: "POST",
          body: formData,
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Upload failed");
        }

        statusText.textContent = "Upload successful.";
        resultJson.textContent = JSON.stringify(data, null, 2);

        const previewUrl = data.imageUrl || buildPublicUrl(publicBaseInput.value.trim(), data.filename);

        if (previewUrl) {
          imageLink.href = previewUrl;
          imageLink.textContent = "Open uploaded image: " + previewUrl;
          imageLink.style.display = "inline-block";

          resultImage.src = previewUrl;
          resultImage.style.display = "block";
        } else {
          statusText.textContent = "Uploaded to FTP. Enter Public URL base to preview from this page.";
        }

        if (data.remotePath) {
          statusText.textContent += " Remote path: " + data.remotePath;
        }
      } catch (error) {
        statusText.textContent = "Error: " + error.message;
      } finally {
        uploadBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
